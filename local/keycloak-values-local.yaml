# Local overrides — uses bitnami/keycloak chart (latest) instead of mosip/keycloak
# which pins images no longer available on Docker Hub.
# Single replica, reduced resources, no TLS (use port-forward).

replicaCount: 1

production: false

ingress:
  enabled: true
  hostname: iam.localhost
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
  tls: false

resources:
  limits:
    cpu: 500m
    memory: 768Mi
  requests:
    cpu: 100m
    memory: 512Mi

auth:
  adminUser: admin
  adminPassword: admin

service:
  type: ClusterIP

postgresql:
  enabled: true
  auth:
    postgresPassword: postgres
    password: keycloak
  primary:
    persistence:
      storageClass: hostpath
      size: 1Gi
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
