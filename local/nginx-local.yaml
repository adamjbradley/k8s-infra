# Nginx reverse proxy deployed as a K8s pod (replaces the host-level apt-install nginx).
# Routes traffic to ingress-nginx controller inside the cluster via ClusterIP.
# For local dev: access via kubectl port-forward or NodePort 30443/30080.
apiVersion: v1
kind: Namespace
metadata:
  name: nginx-local
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: nginx-local
data:
  nginx.conf: |
    worker_processes auto;
    events {
      worker_connections 768;
      multi_accept on;
    }
    http {
      proxy_buffer_size   128k;
      proxy_buffers       4 256k;
      proxy_busy_buffers_size 256k;
      client_max_body_size 30m;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      server_tokens off;

      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      access_log /var/log/nginx/access.log;
      error_log  /var/log/nginx/error.log;

      gzip on;

      # Catch-all: forward everything to ingress-nginx controller
      upstream ingress_backend {
        server ingress-nginx-controller.ingress-nginx.svc.cluster.local:80;
      }

      server {
        listen 80 default_server;
        server_name _;

        location / {
          proxy_pass              http://ingress_backend;
          proxy_http_version      1.1;
          proxy_set_header        Upgrade $http_upgrade;
          proxy_set_header        Connection "upgrade";
          proxy_set_header        Host $host;
          proxy_set_header        X-Real-IP $remote_addr;
          proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header        X-Forwarded-Proto $scheme;
          proxy_pass_request_headers on;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: nginx-local
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.24-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 32Mi
      volumes:
        - name: config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: nginx-local
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30000
