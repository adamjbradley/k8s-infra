# Local overrides for MOSIP PostgreSQL.
# Reduces resources from production levels for Docker Desktop.
primary:
  extendedConfiguration: |
    max_connections=200
    wal_level=logical
    max_wal_senders=5
    max_replication_slots=3
  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 200m
      memory: 512Mi
  persistence:
    storageClass: hostpath
    size: 8Gi
audit:
  logHostname: true
  logConnections: false
  logDisconnections: false
image:
  debug: false
